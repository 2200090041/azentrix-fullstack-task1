<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
}

/* Header */

.profile-header{
    background:linear-gradient(
        135deg,
        #0d6efd,
        #6610f2
    );

    height:220px;
    border-bottom-left-radius:40px;
    border-bottom-right-radius:40px;
}

/* Main Card */

.profile-card{
    max-width:850px;
    margin:auto;
    margin-top:-90px;

    background:white;
    border-radius:25px;

    box-shadow:0 10px 30px rgba(0,0,0,.12);

    overflow:hidden;
}

/* Left Side */

.left-section{
    background:#0f172a;
    color:white;
    padding:40px;
    text-align:center;
    min-height:100%;
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    background:white;
    color:#0f172a;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:55px;

    margin:auto;
}

.username{
    margin-top:20px;
    font-size:24px;
    font-weight:600;
}

.role{
    color:#cbd5e1;
    font-size:14px;
}

/* Right Side */

.right-section{
    padding:40px;
}

.section-title{
    font-size:24px;
    font-weight:600;
    margin-bottom:25px;
}

.info-card{
    background:#f8fafc;
    border-radius:15px;
    padding:18px;
    margin-bottom:15px;
}

.info-label{
    color:gray;
    font-size:13px;
}

.info-value{
    font-size:18px;
    font-weight:600;
}

.form-control{
    height:55px;
    border-radius:15px;
}

.btn-save{
    background:linear-gradient(
        135deg,
        #0d6efd,
        #6610f2
    );

    border:none;
    color:white;
    height:55px;
    border-radius:15px;
    font-weight:600;
}

.btn-save:hover{
    opacity:.9;
}

.success-msg{
    color:green;
    margin-top:15px;
    text-align:center;
    font-weight:600;
}

.action-buttons{
    margin-top:25px;
}

.action-buttons a{
    border-radius:12px;
    margin-right:10px;
}

</style>

</head>

<body>

<div class="profile-header"></div>

<div class="container">

<div class="profile-card">

<div class="row g-0">

<!-- LEFT -->

<div class="col-md-4 left-section">

<div class="avatar">
👤
</div>

<div class="username"
     th:text="${user.username}">
</div>

<div class="role">
Budget Tracker User
</div>

<hr>

<p>
Manage your account details,
security settings and personal information.
</p>

</div>

<!-- RIGHT -->

<div class="col-md-8 right-section">

<div class="section-title">
Account Information
</div>

<div class="info-card">

<div class="info-label">
Username
</div>

<div class="info-value"
     th:text="${user.username}">
</div>

</div>

<div class="info-card">

<div class="info-label">
Current Email
</div>

<div class="info-value"
     th:text="${user.email}">
</div>

</div>

<form action="/profile"
      method="post">

<div class="mb-3">

<label class="form-label">
Update Email Address
</label>

<input type="email"
    name="email"
    class="form-control"
    th:value="${user.email}"
    required>

</div>

<button class="btn btn-save w-100">
Update Profile
</button>

</form>

<div class="success-msg"
     th:text="${success}">
</div>

<div class="action-buttons">

<a href="/change-password"
class="btn btn-warning">
Change Password </a>

<a href="/"
class="btn btn-secondary">
Dashboard </a>

<a href="/logout"
class="btn btn-danger">
Logout </a>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
