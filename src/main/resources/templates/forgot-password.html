<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password - Budget Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f5f5;
    min-height:100vh;
}

.main-container{
    min-height:100vh;
    display:flex;
}

/* LEFT PANEL */

.left-panel{
    width:50%;
    background:linear-gradient(
        135deg,
        #0f172a,
        #111827,
        #1e293b
    );

    color:white;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    position:relative;
    overflow:hidden;
}

.left-panel::before{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:50%;
}

.left-panel::after{
    content:'';
    position:absolute;
    width:700px;
    height:700px;
    border:1px solid rgba(255,255,255,0.04);
    border-radius:50%;
}

.hero-content{
    z-index:2;
    text-align:center;
    max-width:600px;
    padding:20px;
}

.hero-content h1{
    font-size:4.5rem;
    font-weight:700;
    line-height:1.1;
}

.hero-content p{
    margin-top:25px;
    font-size:1.15rem;
    color:#cbd5e1;
}

.finance-icon{
    font-size:130px;
    margin-top:35px;
}

/* RIGHT PANEL */

.right-panel{
    width:50%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.forgot-box{
    width:420px;
}

.logo{
    font-size:2.3rem;
    font-weight:700;
    margin-bottom:40px;
}

.logo span{
    color:#7c3aed;
}

.forgot-title{
    font-size:2.8rem;
    font-weight:600;
    margin-bottom:10px;
    color:#111827;
}

.subtitle{
    color:#6b7280;
    margin-bottom:30px;
}

.form-control{
    height:58px;
    border-radius:30px;
    padding-left:25px;
}

.form-control:focus{
    border-color:#7c3aed;
    box-shadow:0 0 10px rgba(124,58,237,0.2);
}

.reset-btn{
    width:100%;
    height:58px;
    border:none;
    border-radius:30px;

    background:linear-gradient(
        90deg,
        #ff6b00,
        #ff3d7f
    );

    color:white;
    font-weight:600;
    font-size:16px;

    margin-top:10px;
    transition:.3s;
}

.reset-btn:hover{
    transform:translateY(-2px);
}

.message{
    text-align:center;
    margin-top:15px;
}

.login-text{
    text-align:center;
    margin-top:25px;
}

.login-text a{
    text-decoration:none;
    font-weight:600;
}

/* MOBILE */

@media(max-width:992px){

    .left-panel{
        display:none;
    }

    .right-panel{
        width:100%;
        padding:30px;
    }

    .forgot-box{
        width:100%;
        max-width:420px;
    }
}

</style>
</head>

<body>

<div class="main-container">

    <!-- LEFT SECTION -->

    <div class="left-panel">

        <div class="hero-content">

            <h1>
                Reset Your<br>
                Password
            </h1>

            <p>
				We'll send a secure OTP to your email
				so you can reset your password safely.
            </p>

            <div class="finance-icon">
                🔐
            </div>

        </div>

    </div>

    <!-- RIGHT SECTION -->

    <div class="right-panel">

        <div class="forgot-box">

            <div class="logo">
                Budget<span>Tracker</span>
            </div>

            <h2 class="forgot-title">
                Forgot Password
            </h2>

            <p class="subtitle">
                Enter your registered email address to receive an OTP
            </p>

			<form action="/send-otp" method="post">

			    <div class="mb-3">
			        <input type="email"
			               name="email"
			               class="form-control"
			               placeholder="Registered Email Address"
			               required>
			    </div>

			    <button type="submit"
			            class="reset-btn">
			        Send OTP
			    </button>

			</form>

            <div class="message text-danger"
                 th:text="${error}">
            </div>

            <div class="message text-success"
                 th:text="${success}">
            </div>

            <div class="login-text">
                Remember your password?
                <a href="/login">
                    Sign In
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
