<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Change Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4f46e5,#7c3aed,#9333ea);
}

.password-card{
    width:450px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    animation:fadeIn 0.6s ease;
}

.logo{
    text-align:center;
    font-size:55px;
    margin-bottom:10px;
}

.title{
    text-align:center;
    color:#333;
    font-weight:700;
}

.subtitle{
    text-align:center;
    color:#777;
    margin-bottom:25px;
}

.form-control{
    height:50px;
    border-radius:12px;
}

.form-control:focus{
    border-color:#6d28d9;
    box-shadow:0 0 8px rgba(109,40,217,0.3);
}

.btn-update{
    width:100%;
    height:50px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    color:white;
    font-weight:600;
    transition:0.3s;
}

.btn-update:hover{
    transform:translateY(-2px);
}

.message{
    text-align:center;
    margin-top:15px;
}

.back-home{
    text-align:center;
    margin-top:20px;
}

.back-home a{
    text-decoration:none;
    font-weight:600;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="password-card">

    <div class="logo">🔑</div>

    <h2 class="title">Change Password</h2>

    <p class="subtitle">
        Update your account password securely
    </p>

    <form action="/change-password" method="post">

        <div class="mb-3">
            <input type="password"
                   name="oldPassword"
                   class="form-control"
                   placeholder="Current Password"
                   required>
        </div>

        <div class="mb-3">
            <input type="password"
                   name="newPassword"
                   class="form-control"
                   placeholder="New Password"
                   required>
        </div>

        <button type="submit" class="btn-update">
            Update Password
        </button>

    </form>

    <div class="message text-danger"
         th:text="${error}">
    </div>

    <div class="message text-success"
         th:text="${success}">
    </div>

    <div class="back-home">
        <a href="/">← Back to Dashboard</a>
    </div>

</div>

</body>
</html>
