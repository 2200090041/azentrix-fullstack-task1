<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account - Budget Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f5f5;
    min-height:100vh;
}

.main-container{
    min-height:100vh;
    display:flex;
}

/* LEFT PANEL */

.left-panel{
    width:50%;
    background:linear-gradient(
        135deg,
        #0f172a,
        #111827,
        #1e293b
    );

    color:white;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    position:relative;
    overflow:hidden;
}

.left-panel::before{
    content:'';
    position:absolute;

    width:500px;
    height:500px;

    border:1px solid rgba(255,255,255,0.08);
    border-radius:50%;
}

.left-panel::after{
    content:'';
    position:absolute;

    width:700px;
    height:700px;

    border:1px solid rgba(255,255,255,0.04);
    border-radius:50%;
}

.hero-content{
    z-index:2;
    text-align:center;
    max-width:600px;
    padding:20px;
}

.hero-content h1{
    font-size:4.5rem;
    font-weight:700;
    line-height:1.1;
}

.hero-content p{
    margin-top:25px;
    font-size:1.15rem;
    color:#cbd5e1;
}

.finance-icon{
    font-size:130px;
    margin-top:35px;
}

/* RIGHT PANEL */

.right-panel{
    width:50%;
    background:white;

    display:flex;
    justify-content:center;
    align-items:center;
}

.register-box{
    width:450px;
}

.logo{
    font-size:2.3rem;
    font-weight:700;
    margin-bottom:40px;
}

.logo span{
    color:#7c3aed;
}

.register-title{
    font-size:2.8rem;
    font-weight:600;
    margin-bottom:25px;
    color:#111827;
}

.form-control{
    height:58px;
    border-radius:30px;
    padding-left:25px;
}

.form-control:focus{
    border-color:#7c3aed;
    box-shadow:0 0 10px rgba(124,58,237,0.2);
}

.register-btn{
    width:100%;
    height:58px;
    border:none;
    border-radius:30px;

    background:linear-gradient(
        90deg,
        #ff6b00,
        #ff3d7f
    );

    color:white;
    font-weight:600;
    font-size:16px;

    margin-top:10px;

    transition:.3s;
}

.register-btn:hover{
    transform:translateY(-2px);
}

.login-text{
    text-align:center;
    margin-top:25px;
}

.login-text a{
    text-decoration:none;
    font-weight:600;
}

.error-msg{
    text-align:center;
    color:red;
    margin-top:15px;
}

/* MOBILE */

@media(max-width:992px){

    .left-panel{
        display:none;
    }

    .right-panel{
        width:100%;
        padding:30px;
    }

    .register-box{
        width:100%;
        max-width:450px;
    }
}

</style>

</head>
<body>

<div class="main-container">

    <!-- LEFT SECTION -->

    <div class="left-panel">

        <div class="hero-content">

            <h1>
                Start Your<br>
                Financial Journey
            </h1>

            <p>
                Create your account and take control
                of your income, expenses and savings.
            </p>

            <div class="finance-icon">
                🚀
            </div>

        </div>

    </div>

    <!-- RIGHT SECTION -->

    <div class="right-panel">

        <div class="register-box">

            <div class="logo">
                Budget<span>Tracker</span>
            </div>

            <h2 class="register-title">
                Create Account
            </h2>

            <form action="/register" method="post">

                <div class="mb-3">
                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Username"
                           required>
                </div>

                <div class="mb-3">
                    <input type="email"
                           name="email"
                           class="form-control"
                           placeholder="Email Address"
                           required>
                </div>

                <div class="mb-3">
                    <input type="password"
                           id="password"
                           name="password"
                           class="form-control"
                           placeholder="Password"
                           required>
                </div>

                <div class="mb-3">
                    <input type="password"
                           id="confirmPassword"
                           class="form-control"
                           placeholder="Confirm Password"
                           required>
                </div>

                <button type="submit"
                        class="register-btn">
                    Create Account
                </button>

            </form>

            <div class="error-msg"
                 th:text="${error}">
            </div>

            <div class="login-text">

                Already have an account?

                <a href="/login">
                    Sign In
                </a>

            </div>

        </div>

    </div>

</div>

<script>

document.querySelector("form")
.addEventListener("submit", function(e){

    let password =
        document.getElementById("password").value;

    let confirm =
        document.getElementById("confirmPassword").value;

    if(password !== confirm){

        alert("Passwords do not match");

        e.preventDefault();
    }

});

</script>

</body>
</html>
