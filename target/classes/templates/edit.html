<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Transaction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4f46e5,#7c3aed,#9333ea);
    padding:30px;
}

.edit-card{
    width:600px;
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    animation:fadeIn 0.6s ease;
}

.logo{
    text-align:center;
    font-size:55px;
    margin-bottom:10px;
}

.title{
    text-align:center;
    font-weight:700;
    color:#333;
}

.subtitle{
    text-align:center;
    color:#777;
    margin-bottom:25px;
}

.form-control,
.form-select{
    height:50px;
    border-radius:12px;
}

.form-control:focus,
.form-select:focus{
    border-color:#6d28d9;
    box-shadow:0 0 8px rgba(109,40,217,0.3);
}

.btn-update{
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    border:none;
    border-radius:12px;
    height:50px;
    font-weight:600;
}

.btn-cancel{
    border-radius:12px;
    height:50px;
    font-weight:600;
}

.button-group{
    display:flex;
    gap:10px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>
<body>

<div class="edit-card">

    <div class="logo">✏️</div>

    <h2 class="title">Edit Transaction</h2>

    <p class="subtitle">
        Update your income or expense details
    </p>

    <form th:action="@{/update}" method="post">

        <input type="hidden"
               name="id"
               th:value="${transaction.id}">

        <div class="mb-3">
            <label class="form-label">Description</label>
            <input type="text"
                   class="form-control"
                   name="description"
                   th:value="${transaction.description}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Amount</label>
            <input type="number"
                   step="0.01"
                   class="form-control"
                   name="amount"
                   th:value="${transaction.amount}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Category</label>
            <input type="text"
                   class="form-control"
                   name="category"
                   th:value="${transaction.category}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date"
                   class="form-control"
                   name="transactionDate"
                   th:value="${transaction.transactionDate}"
                   required>
        </div>

        <div class="mb-4">
            <label class="form-label">Type</label>

            <select class="form-select" name="type">

                <option value="Income"
                        th:selected="${transaction.type=='Income'}">
                    Income
                </option>

                <option value="Expense"
                        th:selected="${transaction.type=='Expense'}">
                    Expense
                </option>

            </select>
        </div>

        <div class="button-group">

            <button type="submit"
                    class="btn btn-update text-white w-100">
                Update Transaction
            </button>

            <a href="/"
               class="btn btn-secondary btn-cancel w-100">
                Cancel
            </a>

        </div>

    </form>

</div>

</body>
</html>
